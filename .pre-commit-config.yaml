repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (baseline)
        args: ["--baseline", "detect-secrets.baseline"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: potfoundry-forbid-service-role
        name: "Block committing Supabase service_role keys"
        entry: scripts/precommit_forbid_service_role.sh
        language: script
        pass_filenames: true
        files: '.*'
