repos:
  - repo: https://github.com/charliermarsh/ruff-pre-commit
    rev: v0.0.287
    hooks:
      - id: ruff
        args: ["--fix"]

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.4.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.12.0
    hooks:
      - id: isort
        args: ["--profile=black"]
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (baseline)
        args: ["--baseline", "detect-secrets.baseline"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--select=E,F,I",
                "--target-version=py311",
                "--statistics",
                "."]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast marker)
        entry: pytest -q -m fast
        language: system
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: potfoundry-forbid-service-role
        name: "Block committing Supabase service_role keys"
        entry: scripts/precommit_forbid_service_role.py
        language: python
        pass_filenames: true
        files: '.*'
