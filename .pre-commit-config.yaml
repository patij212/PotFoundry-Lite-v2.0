repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      # Only run the error/format-related checks that are safe to auto-fix in
      # pre-commit. We avoid selecting the full set of pycodestyle (E) checks
      # here because the project prefers to ignore E501 (line-too-long) via
      # pyproject.toml. Selecting only F (flake8-style errors) and I (imports)
      # keeps pre-commit fast and less noisy.
      - id: ruff
        args: ["--fix", "--select=F,I", "--target-version=py311", "--statistics", "."]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.1
    hooks:
      - id: mypy
        args: ["--ignore-missing-imports"]

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml

  - repo: https://github.com/pre-commit/mirrors-isort
    rev: v5.12.0
    hooks:
      - id: isort
        args: ["--profile=black"]
repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (baseline)
        # Use the baseline file and exclude generated artifacts and CI dumps
        # that produce noisy false positives (e.g. .runs_grep.txt, artifacts/,
        # or local caches like .mypy_cache). Match both forward and back
        # slashes so the exclusion works on Windows runners and local dev
        # environments.
        args: ["--baseline", "detect-secrets.baseline", "--exclude-files", "(?:^\\.runs_grep\\.txt$|(?:artifacts|\\.gha_.*|\\.github/workflows/pr-validation.yml.corrupt.bak$|\\.mypy_cache|\\.venv|\\.pytest_cache)(?:[\\\\/]|$))"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--select=F,I",
                "--target-version=py311",
                "--statistics",
                "."]
      - id: ruff-format
  - repo: local
    hooks:
      - id: pytest
        name: pytest (fast marker)
        entry: pytest -q -m fast
        language: system
        pass_filenames: false
        types: [python]
  - repo: local
    hooks:
      - id: potfoundry-forbid-service-role
        name: "Block committing Supabase service_role keys"
        entry: scripts/precommit_forbid_service_role.py
        language: python
        pass_filenames: true
        files: '.*'
