repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        name: detect-secrets (baseline)
        args: ["--baseline", "detect-secrets.baseline"]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-added-large-files
      - id: end-of-file-fixer
      - id: trailing-whitespace
  - repo: local
    hooks:
      - id: potfoundry-forbid-service-role
        name: "Block committing Supabase service_role keys"
        # Run the script via the system python to avoid requiring the
        # executable bit on Windows-checkouts and CI clones. Using
        # `language: system` runs the provided entry with the system
        # environment (here we call python explicitly).
        entry: python scripts/precommit_forbid_service_role.py
        language: system
        pass_filenames: true
        files: '.*'
