name: PR Validation (full)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

env:
  PYTHONDONTWRITEBYTECODE: '1'

jobs:
  import-smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Import potfoundry and pfui
        run: |
          python - <<'PY'
          import importlib
          try:
              importlib.import_module('potfoundry')
              importlib.import_module('pfui')
              print('Imported potfoundry and pfui OK')
          except Exception as e:
              print('IMPORT ERROR:', e)
              raise
          PY

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    needs: import-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit
        run: |
          pre-commit run --all-files || true

  mypy:
    name: Static typecheck (mypy)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mypy
        run: python -m pip install mypy

      - name: Run mypy on packages (non-blocking)
        run: |
          mypy pfui potfoundry || true

  pytest:
    name: Run tests (pytest)
    runs-on: ubuntu-latest
    needs: mypy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest

      - name: Run pytest
        run: python -m pytest -q
