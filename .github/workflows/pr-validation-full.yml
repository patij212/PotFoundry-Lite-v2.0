name: PR Validation (full)

on:
  push:
    branches: [ 'fix/edgeflow-debug-quick' ]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}

env:
  PYTHONDONTWRITEBYTECODE: '1'

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  import-smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Import potfoundry and pfui
        run: |
          python - <<'PY'
          import importlib
          try:
              importlib.import_module('potfoundry')
              importlib.import_module('pfui')
              print('Imported potfoundry and pfui OK')
          except Exception as e:
              print('IMPORT ERROR:', e)
              raise
          PY

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    needs: import-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pre-commit + dev deps
        run: |
          python -m pip install --upgrade pip
          # Install project dev/test dependencies so pre-commit's pytest hook can import runtime deps
          python -m pip install -r requirements-dev.txt --no-cache-dir
          # Install pre-commit and pytest (pre-commit will still manage its own hook envs)
          python -m pip install pre-commit pytest

      - name: Run pre-commit
        run: |
          pre-commit run --all-files || true

  mypy:
    name: Static typecheck (mypy)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install mypy + dev requirements (for stubs)
        run: |
          python -m pip install --upgrade pip
          # Install project dev/test dependencies so mypy can find type stubs (types-requests, etc.)
          python -m pip install -r requirements-dev.txt --no-cache-dir

      - name: Run mypy on packages (non-blocking)
        run: |
          mypy pfui potfoundry || true

  pytest:
    name: Run tests (pytest)
    runs-on: ubuntu-latest
    needs: mypy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          # install full dev/test dependencies so numpy, pydantic, etc. are available
          python -m pip install -r requirements-dev.txt --no-cache-dir

      - name: Run pytest (write junit + durations)
        run: |
          # Run pytest with durations and produce junit xml + plain text output
          python -m pytest -q --durations=10 --junitxml=pytest-report.xml 2>&1 | tee pytest-output.txt

      - name: Upload pytest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: |
            pytest-report.xml
            pytest-output.txt

      - name: Generate pytest summary JSON
        run: |
          python .github/scripts/pytest_junit_summary.py pytest-report.xml pytest-summary.json

      - name: Upload pytest summary
        uses: actions/upload-artifact@v4
        with:
          name: pytest-summary
          path: |
            pytest-summary.json

      - name: Post pytest summary as PR comment
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'pytest-summary.json';
            if (!fs.existsSync(path)) {
              core.info('No summary file present, skipping PR comment.');
              return;
            }
            const content = fs.readFileSync(path, 'utf8');
            const summary = JSON.parse(content);
            // Find PR for this branch
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.GITHUB_REF.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${branch}` });
            if (!prs.data || prs.data.length === 0) {
              core.info(`No pull request found for branch ${branch}, skipping comment.`);
              return;
            }
            const pr = prs.data[0];
            const top = (summary.slowest || []).slice(0,10).map((s, i) => `${i+1}. ${s.file || s.nodeid} — ${s.name} — ${s.time}s`).join('\n');
            const body = `Automated CI summary:\n\n- Status: ✅ completed\n- Tests: ${summary.tests.total} passed (errors=${summary.tests.errors} failures=${summary.tests.failures} skipped=${summary.tests.skipped})\n- Total time: ${summary.tests.time}s\n\nTop slow tests:\n${top}\n\nFull artifacts: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });
