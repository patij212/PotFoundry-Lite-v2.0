name: PR Validation (full)

on:
  # Run on pull requests across all branches, plus pushes to the default branch
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [ 'apply/streamlit-fix', 'main', 'fix/edgeflow-debug-quick' ]
  workflow_dispatch: {}

env:
  PYTHONDONTWRITEBYTECODE: '1'

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  import-smoke:
    name: Import smoke test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy

      - name: Import potfoundry and pfui
        run: |
          python - <<'PY'
          import importlib
          try:
              importlib.import_module('potfoundry')
              importlib.import_module('pfui')
              print('Imported potfoundry and pfui OK')
          except Exception as e:
              print('IMPORT ERROR:', e)
              raise
          PY

  auto-format:
    name: Auto-format and push fixes
    runs-on: ubuntu-latest
    needs: import-smoke
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install formatting tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install pre-commit ruff --no-cache-dir

      - name: Run autoformat hooks (may modify files)
        run: |
          # Run only the formatting hooks to avoid requiring test/runtime deps
          # (this keeps auto-format fast and safe). If additional hooks should
          # be auto-applied, add them explicitly here. We include a couple of
          # safe, auto-fix hooks (end-of-file-fixer and trailing-whitespace)
          # so trivial whitespace issues are committed automatically.
          pre-commit run ruff --all-files || true
          pre-commit run ruff-format --all-files || true
          pre-commit run end-of-file-fixer --all-files || true
          pre-commit run trailing-whitespace --all-files || true

      - name: Commit & push fixes (if any)
        if: ${{ github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false) }}
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "chore(ci): apply auto-format fixes" || echo "No commit"
            git push
          else
            echo "No changes to commit"
          fi

  pre-commit:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    needs: [import-smoke, auto-format]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install pre-commit + dev deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt --no-cache-dir
          python -m pip install pre-commit pytest

      - name: Run pre-commit
        run: |
          # Run pre-commit and capture console output. Do NOT mask failures here so
          # the job fails when hooks report problems.
          pre-commit run --all-files 2>&1 | tee pre-commit-output.txt

      - name: Upload pre-commit artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pre-commit-reports
          path: |
            pre-commit-output.txt
            .runs_grep.txt
            ruff-before.txt
            ruff-after.txt
            ruff-fix.txt
            mypy-out.txt
            mypy-out2.txt
            .github/workflows/pr-validation.yml.corrupt.bak

  mypy:
    name: Static typecheck (mypy)
    runs-on: ubuntu-latest
    needs: pre-commit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install mypy + dev requirements (for stubs)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt --no-cache-dir

      - name: Run mypy on packages
        run: |
          # Run mypy and capture output. Exit code will fail the job on errors.
          mypy pfui potfoundry 2>&1 | tee mypy-out.txt

      - name: Upload mypy artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mypy-report
          path: |
            mypy-out.txt
            mypy-out2.txt

  pytest:
    name: Run tests (pytest)
    runs-on: ubuntu-latest
    needs: mypy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install test deps
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt --no-cache-dir
          python -m pip install pytest-cov

      - name: Run pytest (write junit + durations + coverage)
        run: |
          python -m pytest -q \
            --durations=10 \
            --junitxml=pytest-report.xml \
            --cov=potfoundry --cov=pfui \
            --cov-report=xml --cov-report=term \
            2>&1 | tee pytest-output.txt

      - name: Enforce coverage threshold (>= 50%)
        run: |
          coverage report --fail-under=50

      - name: Upload pytest artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pytest-reports
          path: |
            pytest-report.xml
            pytest-output.txt

      - name: Generate pytest summary JSON
        run: |
          python .github/scripts/pytest_junit_summary.py pytest-report.xml pytest-summary.json

      - name: Upload pytest summary
        uses: actions/upload-artifact@v4
        with:
          name: pytest-summary
          path: |
            pytest-summary.json

      - name: Post pytest summary as PR comment
        uses: actions/github-script@v6
        continue-on-error: true
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = 'pytest-summary.json';
            if (!fs.existsSync(path)) {
              core.info('No summary file present, skipping PR comment.');
              return;
            }
            const content = fs.readFileSync(path, 'utf8');
            const summary = JSON.parse(content);
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = process.env.GITHUB_REF.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({ owner, repo, head: `${owner}:${branch}` });
            if (!prs.data || prs.data.length === 0) {
              core.info(`No pull request found for branch ${branch}, skipping comment.`);
              return;
            }
            const pr = prs.data[0];
            const top = (summary.slowest || []).slice(0,10).map((s, i) => `${i+1}. ${s.file || s.nodeid} — ${s.name} — ${s.time}s`).join('\n');
            const body = `Automated CI summary:\n\n- Status: ✅ completed\n- Tests: ${summary.tests.total} passed (errors=${summary.tests.errors} failures=${summary.tests.failures} skipped=${summary.tests.skipped})\n- Total time: ${summary.tests.time}s\n\nTop slow tests:\n${top}\n\nFull artifacts: ${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({ owner, repo, issue_number: pr.number, body });

  pytest-windows-smoke:
    name: Windows smoke tests
    runs-on: windows-latest
    needs: mypy
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install minimal deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run a tiny Windows smoke suite
        run: |
          pytest -q tests/test_windows_export_path.py || exit 1
          python - <<'PY'
          from potfoundry import build_pot_mesh, STYLES
          fn,_ = STYLES['HarmonicRipple']
          v,f,_ = build_pot_mesh(H=40,Rt=30,Rb=25,t_wall=2.0,t_bottom=2.0,r_drain=4,expn=1.0,n_theta=24,n_z=12,r_outer_fn=fn,style_opts={})
          assert v.size>0 and f.size>0
          print('Windows smoke OK:', v.shape, f.shape)
          PY
