name: Code Quality Checks

on:
  # Run this workflow only when manually dispatched to avoid duplicating PR Validation
  workflow_dispatch:

jobs:
  code-quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 mypy pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Run flake8 with detailed output
        run: |
          flake8 . --count --statistics --format=default > flake8-report.txt || true
          cat flake8-report.txt

      - name: Run mypy type checking
        run: |
          mypy --config-file=mypy.ini potfoundry/ > mypy-report.txt || true
          cat mypy-report.txt
        continue-on-error: true

      - name: Generate coverage report
        run: |
          pytest tests/ --ignore=tests/test_property_based.py \
            --cov=potfoundry --cov=pfui \
            --cov-report=term \
            --cov-report=html \
            --cov-report=json

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/
          retention-days: 30

      - name: Comment PR with quality metrics
        if: github.event_name == 'pull_request'
        run: |
          echo "Code quality checks completed. See artifacts for detailed reports."
