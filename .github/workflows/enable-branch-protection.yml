name: Enable Branch Protection (manual)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to protect (default: main)'
        required: false
        default: 'main'

jobs:
  protect-branch:
    name: Protect branch (requires admin permissions)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check context
        run: |
          echo "Repository: $GITHUB_REPOSITORY"
          echo "Actor: $GITHUB_ACTOR"

      - name: Enable branch protection via GitHub API
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ inputs.branch }}';
            core.info(`Setting branch protection on ${branch} for ${context.repo.owner}/${context.repo.repo}`);
            try {
              await github.rest.repos.updateBranchProtection({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: branch,
                // Recommend setting required checks in the UI to match your current gate names:
                // 'CI / Typecheck', 'CI / Lint', 'CI / Unit Tests', 'CI / Build'
                // Leaving contexts empty here avoids desync if names change.
                required_status_checks: null,
                enforce_admins: false,
                required_pull_request_reviews: null,
                restrictions: null,
              });
              core.info('Branch protection updated.');
            } catch (e) {
              core.setFailed(`Failed to update branch protection: ${e}`);
            }

      - name: Show note
        run: |
          echo "Note: This action requires repository admin permissions. If it fails, set the required status checks ('CI / Typecheck', 'CI / Lint', 'CI / Unit Tests', 'CI / Build') manually in Settings → Branches → Protection rules."
