name: CI Diagnostic

on:
  workflow_dispatch: {}

jobs:
  diag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Show git info
        run: |
          echo "Branch: $GITHUB_REF"
          echo "SHA: $GITHUB_SHA"

      - name: Show pr-validation file (head)
        run: |
          echo '--- pr-validation.yml (head) ---'
          sed -n '1,200p' .github/workflows/pr-validation.yml || true

      - name: Show minimal environment
        run: |
          uname -a || true
          python --version || true
