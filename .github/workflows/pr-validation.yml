name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch: {}
  push:
    branches:
      - fix/edgeflow-debug-quick

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-pr:
    name: PR Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run linters and static checks
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy
          ruff check .
          python -m mypy --check-untyped-defs .

      - name: Run tests and capture coverage
        run: |
          set -o pipefail
          pytest tests/ -v \
            --cov=potfoundry --cov=pfui \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml | tee pytest_output.txt

      - name: Upload test logs & coverage
        uses: actions/upload-artifact@v3
        with:
          name: pr-validation-logs
          path: |
            pytest_output.txt
            coverage.xml

      - name: Publish coverage to Codecov
        if: ${{ secrets.CODECOV_TOKEN != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install codecov
          codecov -f coverage.xml || true

  auto-fix:
    name: Auto-format suggestions (ruff --fix)
    runs-on: ubuntu-latest
    needs: validate-pr
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff --fix and produce patch
        run: |
          ruff --fix . || true
          git config user.email "actions@github.com"
          git config user.name "github-actions[bot]"
          git diff > ruff-fix.patch || true

      - name: Upload ruff patch
        uses: actions/upload-artifact@v3
        with:
          name: ruff-fix
          path: ruff-fix.patch

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Check dependencies for known vulnerabilities
        run: |
          pip install -r requirements.txt
          safety check --json || true
        continue-on-error: true

      - name: Run bandit security linter
        run: |
          bandit -r potfoundry/ pfui/ -f json || true
        continue-on-error: true

        continue-on-error: true
