name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  validate-pr:
    name: PR Quality Check
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
      with:
        fetch-depth: 0  # Fetch full history for better diff analysis
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pytest pytest-cov
    
    - name: Run full test suite
      run: |
        pytest tests/ -v --cov=potfoundry --cov=pfui --cov-report=term-missing
      timeout-minutes: 15
    
    - name: Check code quality metrics
      run: |
        echo "## Code Quality Report" >> $GITHUB_STEP_SUMMARY
        echo "### Test Coverage" >> $GITHUB_STEP_SUMMARY
        pytest tests/ --cov=potfoundry --cov=pfui --cov-report=term | tee coverage_output.txt
        
        # Extract coverage percentage
        COVERAGE=$(grep "TOTAL" coverage_output.txt | awk '{print $4}')
        echo "Overall Coverage: $COVERAGE" >> $GITHUB_STEP_SUMMARY
        
        # Count tests
        TEST_COUNT=$(pytest tests/ --collect-only -q | tail -1)
        echo "Total Tests: $TEST_COUNT" >> $GITHUB_STEP_SUMMARY
    
    - name: Verify no regression in core metrics
      run: |
        # Ensure core modules maintain >90% coverage
        pytest tests/ --cov=potfoundry.geometry --cov=potfoundry.core.geometry --cov=potfoundry.schema --cov-report=term-missing
        
        echo "✅ Core module coverage validated" >> $GITHUB_STEP_SUMMARY

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install security tools
      run: |
        python -m pip install --upgrade pip
        pip install safety bandit
    
    - name: Check dependencies for known vulnerabilities
      run: |
        pip install -r requirements.txt
        safety check --json || true
      continue-on-error: true
    
    - name: Run bandit security linter
      run: |
        bandit -r potfoundry/ pfui/ -f json || true
      continue-on-error: true
