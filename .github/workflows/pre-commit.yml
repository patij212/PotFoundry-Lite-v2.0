name: pre-commit checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # We use the official pre-commit GitHub Action below to avoid PATH/virtualenv
      # isolation issues when invoking pre-commit from a pip-installed binary.
      # Do NOT pip-install pre-commit here.

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install into the runner user site so CLI entrypoints (pytest) are
          # available under $HOME/.local/bin which we add to PATH below.
          pip install --user -r requirements-dev.txt



      - name: "Debug: print repo state (pwd, ls, git status)"
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "whoami: $(whoami)"
          echo "pwd: $(pwd)"
          echo "ls -la (repo root):"
          ls -la || true
          echo "ls -la .git (if present):"
          if [ -d .git ]; then ls -la .git || true; else echo ".git not present"; fi
          echo "git which: $(which git || true)"
          echo "git version: $(git --version || true)"
          echo "git rev-parse --show-toplevel: $(git rev-parse --show-toplevel 2>/dev/null || true)"
          echo "git status:"; git status --porcelain --untracked-files=all || true

      - name: Run pre-commit hooks (via pre-commit/action)
        id: precommit
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files
        continue-on-error: true

      - name: Dump pre-commit internal log on failure
        if: steps.precommit.outcome != 'success'
        run: |
          echo "\npre-commit exited non-zero. Collecting pre-commit internal log..."
          LOG_PATH="/home/runner/.cache/pre-commit/pre-commit.log"
          if [ -f "$LOG_PATH" ]; then
            echo "=== start pre-commit.log ==="
            python -c "import pathlib,sys; print(pathlib.Path('$LOG_PATH').read_text())" || true
            echo "=== end pre-commit.log ==="
          else
            echo "pre-commit internal log not found at $LOG_PATH"
          fi

      - name: Fail if pre-commit failed
        if: steps.precommit.outcome != 'success'
        run: |
          echo "pre-commit failed; failing job"
          exit 1
