name: pre-commit checks

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main, master]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install pre-commit
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          # Install into the runner user site so CLI entrypoints (pytest) are
          # available under $HOME/.local/bin which we add to PATH below.
          pip install --user -r requirements-dev.txt

      - name: Make project helper scripts executable
        run: |
          # Some pre-commit hooks expect project scripts to be executable
          # in the runner. Ensure the script used by the hook has the
          # executable bit set before running pre-commit.
          if [ -f ./scripts/precommit_forbid_service_role.py ]; then
            chmod +x ./scripts/precommit_forbid_service_role.py
          fi

      - name: "Debug: print repo state (pwd, ls, git status)"
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          echo "whoami: $(whoami)"
          echo "pwd: $(pwd)"
          echo "ls -la (repo root):"
          ls -la || true
          echo "ls -la .git (if present):"
          if [ -d .git ]; then ls -la .git || true; else echo ".git not present"; fi
          echo "git which: $(which git || true)"
          echo "git version: $(git --version || true)"
          echo "git rev-parse --show-toplevel: $(git rev-parse --show-toplevel 2>/dev/null || true)"
          echo "git status:"; git status --porcelain --untracked-files=all || true

      - name: Run pre-commit hooks
        env:
          PATH: $HOME/.local/bin:$PATH
        run: |
          # Ensure we're in the checked-out repository root
          cd "$GITHUB_WORKSPACE"

          # Run pre-commit and on failure collect the pre-commit internal log
          pre-commit run --all-files || {
            echo "\npre-commit exited non-zero. Collecting pre-commit internal log..."
            LOG_PATH="/home/runner/.cache/pre-commit/pre-commit.log"
            if [ -f "$LOG_PATH" ]; then
              echo "=== start pre-commit.log ==="
              sed -n '1,2000p' "$LOG_PATH" || true
              echo "=== end pre-commit.log ==="
            else
              echo "pre-commit internal log not found at $LOG_PATH"
            fi
            exit 1
          }
