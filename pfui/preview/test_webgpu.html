<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>WebGPU Adapter Test</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; background:#081018; color:#e6eef6; padding:20px }
    pre { background:#071018; padding:12px; border-radius:6px; overflow:auto; }
    .ok { color:#9ff89f }
    .bad { color:#ff9f9f }
  </style>
</head>
<body>
  <h1>WebGPU Adapter Test</h1>
  <p>This page tries to enumerate a WebGPU adapter using different options and prints results to the console and below.</p>
  <div id="results"><pre id="out">Running tests...
</pre></div>
  <script>
    const out = document.getElementById('out');
    function logLine(s, cls) {
      out.textContent += s + '\n';
      if (cls) {
        const sp = document.createElement('div'); sp.textContent = s; sp.className = cls; document.body.appendChild(sp);
      }
      console.log(s);
    }

    async function run() {
      logLine('navigator.gpu present? ' + (!!navigator.gpu) + ' — UA: ' + navigator.userAgent);
      if (!navigator.gpu) {
        logLine('navigator.gpu missing — your browser lacks the WebGPU API', 'bad');
        return;
      }

      const attempts = [];
      async function attempt(opts, label) {
        try {
          const a = await navigator.gpu.requestAdapter(opts);
          attempts.push({ label, ok: !!a, obj: a });
          logLine(`attempt ${label}: ${a ? 'OK' : 'null'}`);
          console.log(label, a);
        } catch (e) {
          attempts.push({ label, ok: false, err: e });
          logLine(`attempt ${label}: ERROR ${String(e)}`, 'bad');
          console.error(label, e);
        }
      }

      await attempt(undefined, 'default');
      await attempt({ powerPreference: 'high-performance' }, 'high-performance');
      await attempt({ powerPreference: 'low-power' }, 'low-power');
      await attempt({ forceFallbackAdapter: true }, 'fallback');

      logLine('\nSummary:');
      for (const it of attempts) {
        logLine(JSON.stringify(it, (k,v) => (k==='obj' ? (v ? '[GPUAdapter]' : null) : v), 2));
      }

      logLine('\nIf all attempts returned null -> this indicates the browser did not return a usable adapter.');
      logLine('Check chrome://gpu and ensure hardware acceleration + WebGPU are enabled.');
    }

    run();
  </script>
</body>
</html>
