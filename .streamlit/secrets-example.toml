# Streamlit Secrets Configuration Example
# Copy this file to .streamlit/secrets.toml (or use the template) and fill in your values
# NEVER commit secrets.toml to version control! Keep the real secrets out of Git.

# ============================================================
# Supabase Configuration (Public Library Publishing)
# ============================================================
[connections.supabase]
# Your Supabase project URL (copy from Supabase Dashboard → Settings → API)
# Example: "https://xyzcompany.supabase.co"
url = "YOUR_SUPABASE_PROJECT_URL"

# Your Supabase service role key (NOT the anon/public key)
# Find this in: Supabase Dashboard → Settings → API → service_role key
# ⚠️ IMPORTANT: This key has full access to your database. Keep it secret!
key = "YOUR_SUPABASE_SERVICE_ROLE_KEY"

# Storage bucket name used by the app (create this bucket in Supabase Storage)
bucket = "pots"

# ============================================================
# Application Configuration
# ============================================================
# Base URL of your deployed Streamlit app (for deep links)
# Example: "https://potfoundry.streamlit.app"
app_url = "http://localhost:8501"

# ============================================================
# Optional: Feature Flags
# ============================================================
# Set to "1" to disable library publishing feature
# Useful for maintenance or if you want to temporarily disable
# DISABLE_LIBRARY = "0"

# ============================================================
# Optional: Analytics (Future Enhancement)
# ============================================================
# [analytics]
# google_analytics_id = "UA-XXXXXXXXX-X"
# plausible_domain = "potfoundry.streamlit.app"

# ============================================================
# Deployment Instructions
# ============================================================
#
# Local Development:
# 1. Copy this file to .streamlit/secrets.toml
# 2. Fill in your Supabase URL and service key
# 3. Run: streamlit run app.py
#
# Streamlit Cloud:
# 1. Go to your app dashboard: https://share.streamlit.io
# 2. Click "⋮" → "Settings" → "Secrets"
# 3. Paste the contents of this file (with real values)
# 4. Click "Save"
# 5. Deploy/restart your app
#
# Vercel/Heroku/Docker:
# - Set environment variables instead of using this file
# - Prefix with STREAMLIT_: STREAMLIT_SUPABASE_URL, etc.
#
# ============================================================
# Supabase Setup Instructions
# ============================================================
#
# 1. Create Supabase Project:
#    - Go to https://app.supabase.com
#    - Click "New Project"
#    - Choose organization, name, region, database password
#    - Wait for setup to complete (~2 min)
#
# 2. Create Storage Bucket:
#    - In Supabase Dashboard → Storage
#    - Click "Create Bucket"
#    - Name: "pots"
#    - Public: YES (enable public access for downloads)
#    - Click "Create Bucket"
#
# 3. Configure Bucket Policies:
#    - Click bucket "pots" → "Policies"
#    - Add policy: "Enable read access for all users"
#      - Policy name: "Public read"
#      - Allowed operations: SELECT
#      - Target roles: public
#      - Definition: true
#
# 4. Run Database Migration:
#    - In Supabase Dashboard → SQL Editor
#    - Copy contents of db/migrations/0001_create_pots.sql
#    - Paste and click "Run"
#    - Verify table created: Database → Tables → should see "pots"
#
# 5. Get Service Key:
#    - In Supabase Dashboard → Settings → API
#    - Copy "service_role" key (NOT "anon" key)
#    - Paste into this file as "key" value
#
# 6. Get Project URL:
#    - In Supabase Dashboard → Settings → API
#    - Copy "Project URL"
#    - Paste into this file as "url" value
#
# ============================================================
# Security Notes
# ============================================================
#
# ⚠️ The service_role key has FULL ACCESS to your database!
#   - Never commit it to Git
#   - Never expose it in client-side code
#   - Only use it in server-side/backend code (Streamlit app is server-side)
#   - Rotate it periodically (Supabase → Settings → API → "Reset service_role key")
#
# 🔒 Row-Level Security (RLS) protects your data:
#   - Even with service_role key, RLS policies are enforced
#   - Public can only SELECT (read)
#   - Only service_role can INSERT (write)
#   - No UPDATE/DELETE allowed by default
#
# 📊 Monitor usage:
#   - Supabase Dashboard → Database → Reports
#   - Check storage usage: Storage → Usage
#   - Set up usage alerts: Project Settings → Billing
#
# ============================================================
