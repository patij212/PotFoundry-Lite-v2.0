      best = vec3<f32>(0.0, 1.0, 0.0);\r
    } else if (s2 < s0 && s2 < s1) {\r
      best = vec3<f32>(0.0, 0.0, 1.0);\r
    }\r
    right = safe_normalize(cross(best, forward));\r
  }\r
  if (length(right) < 1e-4) {\r
    right = vec3<f32>(1.0, 0.0, 0.0);\r
  }\r
  var up = safe_normalize(cross(forward, right));\r
  if (length(up) < 1e-4) {\r
    up = worldUp;\r
  }\r
  return CameraBasis(right, up, forward);\r
}\r
\r
fn fallback_camera_basis() -> CameraBasis {\r
  let rotX = clamp(getf(19u), -1.5607, 1.5607);\r
  let rotY = getf(20u);\r
  let cosPitch = cos(rotX);\r
  let sinPitch = sin(rotX);\r
  let cosYaw = cos(rotY);\r
  let sinYaw = sin(rotY);\r
  // Euler→forward mapping: forward = [sinYaw*cosPitch, -cosYaw*cosPitch, -sinPitch]\r
  var forward = vec3<f32>(sinYaw * cosPitch, -cosYaw * cosPitch, -sinPitch);\r
  forward = safe_normalize(forward);\r
  if (length(forward) < 1e-4) {\r
    forward = vec3<f32>(0.0, 0.0, 1.0);\r
  }\r
  let worldUp = vec3<f32>(0.0, 0.0, 1.0);\r
  var right = safe_normalize(cross(worldUp, forward));\r
  if (length(right) < 1e-4) {\r
    right = vec3<f32>(1.0, 0.0, 0.0);\r
  }\r
  var up = safe_normalize(cross(forward, right));\r
  if (length(up) < 1e-4) {\r
    up = vec3<f32>(0.0, 0.0, 1.0);\r
  }\r
  return CameraBasis(right, up, forward);\r
}\r
\r
fn derived_camera_basis() -> CameraBasis {\r
  let eye = vec3<f32>(\r
    getf(CAMERA_EYE_OFFSET + 0u),\r
    getf(CAMERA_EYE_OFFSET + 1u),\r
    getf(CAMERA_EYE_OFFSET + 2u)\r
  );\r
  let target_pos = vec3<f32>(getf(29u), getf(31u), 0.0);\r
  var forward = safe_normalize(target_pos - eye);\r
  if (length(forward) < 1e-4) {\r
    forward = vec3<f32>(0.0, 0.0, 1.0);\r
  }\r
  let worldUp = vec3<f32>(0.0, 0.0, 1.0);\r
  var right = safe_normalize(cross(worldUp, forward));\r
  if (length(right) < 1e-4) {\r
    var up_ref = vec3<f32>(0.0, 0.0, 1.0);\r
    if (abs(dot(up_ref, forward)) > 0.94) {\r
      up_ref = vec3<f32>(0.0, 1.0, 0.0);\r
    }\r
    right = safe_normalize(cross(up_ref, forward));\r
  }\r
  if (length(right) < 1e-4) {\r
    right = vec3<f32>(1.0, 0.0, 0.0);\r
  }\r
  var up = safe_normalize(cross(forward, right));\r
  if (length(up) < 1e-4) {\r
    up = vec3<f32>(0.0, 0.0, 1.0);\r
  }\r
  return CameraBasis(right, up, forward);\r
}\r
\r
fn load_basis_vec(offset: u32) -> vec3<f32> {\r
  return vec3<f32>(\r
    getf(offset + 0u),\r
    getf(offset + 1u),\r
    getf(offset + 2u)\r
  );\r
}\r
\r
fn camera_basis() -> CameraBasis {\r
  let raw_right = load_basis_vec(CAMERA_RIGHT_OFFSET);\r
  let raw_up = load_basis_vec(CAMERA_UP_OFFSET);\r
  let raw_forward = load_basis_vec(CAMERA_FORWARD_OFFSET);\r
  let has_uniform_basis =\r
    length(raw_right) >= 1e-4 &&\r
    length(raw_up) >= 1e-4 &&\r
    length(raw_forward) >= 1e-4;\r
  if (has_uniform_basis) {\r
    let rebuilt = orthonormalize_basis(raw_right, raw_up, raw_forward);\r
    if (basis_is_valid(rebuilt)) {\r
      return rebuilt;\r
    }\r
  }\r
  let derived = derived_camera_basis();\r
  if (basis_is_valid(derived)) {\r
    return derived;\r
  }\r
  return fallback_camera_basis();\r
}\r
\r
fn lighting_tuning() -> LightingTuning {\r
  return LightingTuning(\r
    clamp(getf(22u), 0.0, 1.0),\r
    clamp(getf(23u), 0.0, 1.0),\r
    clamp(getf(24u), 0.0, 1.0),\r
    clamp(getf(SPECULAR_GAIN_OFFSET), 0.0, 1.0),\r
    clamp(getf(ROUGHNESS_OFFSET), 0.02, 1.0)\r
  );\r
}\r
\r
fn phong_specular(N: vec3<f32>, V: vec3<f32>, L: vec3<f32>, exponent: f32) -> f32 {\r
  let H = safe_normalize(L + V);\r
  let NdotH = max(dot(N, H), 0.0);\r
  return pow(NdotH, exponent);\r
}\r
\r
// GGX/Trowbridge-Reitz distribution for more realistic specular\r
fn ggx_distribution(NdotH: f32, roughness: f32) -> f32 {\r
  let a = roughness * roughness;\r
  let a2 = a * a;\r
  let NdotH2 = NdotH * NdotH;\r
  let denom = NdotH2 * (a2 - 1.0) + 1.0;\r
  return a2 / (3.14159 * denom * denom + 0.0001);\r
}\r
\r
// Fresnel-Schlick approximation\r
fn fresnel_schlick(cosTheta: f32, F0: f32) -> f32 {\r
  return F0 + (1.0 - F0) * pow(1.0 - cosTheta, 5.0);\r
}\r
\r
fn spec_power_from_roughness(roughness: f32) -> f32 {\r
  let clamped = clamp(roughness, 0.02, 1.0);\r
  let gloss = pow(1.0 - clamped, 3.0);\r
  return mix(18.0, 240.0, gloss);\r
}\r
\r
// Professional studio lighting setup - surrounds the object for beautiful highlights\r
fn build_camera_rig() -> LightingRig {\r
  // Key light: front-top-right (main illumination)\r
  let key = normalize(vec3<f32>(0.3, -0.4, 0.85));\r
  // Fill light: front-left (softer, fills shadows)\r
  let fill = normalize(vec3<f32>(-0.6, -0.3, 0.6));\r
  // Back light: behind and above (rim lighting)\r
  let back = normalize(vec3<f32>(0.0, 0.9, 0.35));\r
  // Left rim/kicker: side accent\r
  let rim_left = normalize(vec3<f32>(-0.85, 0.2, 0.4));\r
  // Right rim/kicker: side accent\r
  let rim_right = normalize(vec3<f32>(0.85, 0.2, 0.4));\r
  // Bottom bounce: subtle upward fill\r
  let bottom = normalize(vec3<f32>(0.0, 0.1, -0.95));\r
  // Top soft light: overall ambient direction\r
  let top = normalize(vec3<f32>(0.0, 0.0, 1.0));\r
  \r
  return LightingRig(key, fill, back, rim_left, rim_right, bottom, top);\r
}\r
\r
fn lambert(N: vec3<f32>, L: vec3<f32>) -> f32 {\r
  return max(dot(N, L), 0.0);\r
}\r
\r
// Soft wrap lighting for smoother falloff\r
fn wrap_lambert(N: vec3<f32>, L: vec3<f32>, wrap: f32) -> f32 {\r
  let d = dot(N, L);\r
  return max((d + wrap) / (1.0 + wrap), 0.0);\r
}\r
\r
struct VSOut {\r
  @builtin(position) pos: vec4<f32>,\r
  @location(0) col: vec3<f32>,\r
  @location(1) n_cam: vec3<f32>,\r
  @location(2) world_pos: vec3<f32>,\r
  @location(3) is_ground: f32,\r
};\r
\r
fn gradient_color(height_ratio: f32) -> vec3<f32> {\r
  let t = clamp(height_ratio, 0.0, 1.0);\r
  if (t <= 0.5) {\r
    let local = smoothstep(0.0, 0.5, t);\r
    return mix(uC1.xyz, uC2.xyz, local);\r
  }\r
  let local = smoothstep(0.5, 1.0, t);\r
  return mix(uC2.xyz, uC3.xyz, local);\r
}\r
\r
fn shade_color(base: vec3<f32>, n_world: vec3<f32>, view_dir: vec3<f32>) -> vec3<f32> {\r
  let N = safe_normalize(n_world);\r
  let V = safe_normalize(view_dir);\r
  let tuning = lighting_tuning();\r
  let cam = camera_basis();\r
  let rig = build_camera_rig();\r
  let N_cam = safe_normalize(world_to_camera(N, cam));\r
  let V_cam = safe_normalize(world_to_camera(V, cam));\r
\r
  // Enhanced ambient with hemisphere lighting (sky/ground gradient)\r
  let sky_color = vec3<f32>(0.85, 0.90, 1.0);  // Soft blue sky\r
  let ground_color = vec3<f32>(0.4, 0.35, 0.3); // Warm ground bounce\r
  let hemi_blend = N_cam.z * 0.5 + 0.5; // Remap -1..1 to 0..1\r
  let hemisphere_ambient = mix(ground_color, sky_color, hemi_blend);\r
  let ambient_strength = 0.08 + tuning.ambient * 0.35;\r
  let ambient_term = hemisphere_ambient * ambient_strength;\r
\r
  // Multi-light diffuse with wrap lighting for softer shadows\r
  var diffuse = vec3<f32>(0.0, 0.0, 0.0);\r
  \r
  // Key light - main directional, warm tint\r
  let key_intensity = wrap_lambert(N_cam, rig.key, 0.15);\r
  diffuse += vec3<f32>(1.0, 0.98, 0.95) * key_intensity * 0.55;\r
  \r
  // Fill light - soft counter to key, slightly cool\r
  let fill_intensity = wrap_lambert(N_cam, rig.fill, 0.25);\r
  diffuse += vec3<f32>(0.92, 0.95, 1.0) * fill_intensity * 0.35;\r
  \r
  // Back light - rim/backlight effect\r
  let back_intensity = wrap_lambert(N_cam, rig.back, 0.3);\r
  diffuse += vec3<f32>(1.0, 0.92, 0.85) * back_intensity * 0.22;\r
  \r
  // Rim/kicker lights - edge definition from sides\r
  let rim_left_intensity = lambert(N_cam, rig.rim_left);\r
  let rim_right_intensity = lambert(N_cam, rig.rim_right);\r
  diffuse += vec3<f32>(1.0, 1.0, 1.0) * rim_left_intensity * 0.28;\r
  diffuse += vec3<f32>(1.0, 1.0, 1.0) * rim_right_intensity * 0.28;\r
  \r
  // Top and bottom lights\r
  let top_intensity = lambert(N_cam, rig.top);\r
  let bottom_intensity = lambert(N_cam, rig.bottom);\r
  diffuse += vec3<f32>(0.95, 0.98, 1.0) * top_intensity * 0.18;\r
  diffuse += vec3<f32>(1.0, 0.95, 0.90) * bottom_intensity * 0.15;\r
  \r
  diffuse *= 0.4 + tuning.diffuse * 0.85;\r
\r
  // Enhanced specular with GGX-style distribution\r
  let spec_power = spec_power_from_roughness(tuning.roughness);\r
  let spec_power_tight = spec_power * 1.5; // Tighter highlights for key\r
  \r
  var specular = 0.0;\r
  // Key light - primary specular highlight\r
  specular += phong_specular(N_cam, V_cam, rig.key, spec_power_tight) * 1.4;\r
  // Fill light - softer secondary highlight\r
  specular += phong_specular(N_cam, V_cam, rig.fill, spec_power * 0.7) * 0.65;\r
  // Rim/kicker lights - sharp edge highlights\r
  specular += phong_specular(N_cam, V_cam, rig.rim_left, spec_power * 1.3) * 1.1;\r
  specular += phong_specular(N_cam, V_cam, rig.rim_right, spec_power * 1.3) * 1.1;\r
  // Back light - subtle rim glint\r
  specular += phong_specular(N_cam, V_cam, rig.back, spec_power * 0.9) * 0.5;\r
  specular *= tuning.specular;\r
\r
  // Enhanced Fresnel with Schlick approximation\r
  let NdotV = max(dot(N_cam, V_cam), 0.0);\r
  let fresnel_base = 0.04; // Dielectric F0\r
  let fresnel = fresnel_base + (1.0 - fresnel_base) * pow(1.0 - NdotV, 5.0);\r
  let fresnel_term = tuning.fresnel * fresnel * 0.8;\r
\r
  // Multi-directional rim lighting for silhouette definition\r
  let rim_key = pow(max(1.0 - lambert(N_cam, rig.key), 0.0), 2.5);\r
  let rim_fill = pow(max(1.0 - lambert(N_cam, rig.fill), 0.0), 3.0);\r
  let rim_back_effect = pow(max(1.0 - dot(N_cam, V_cam), 0.0), 3.5);\r
  let rim_combined = (rim_key * 0.35 + rim_fill * 0.25 + rim_back_effect * 0.4);\r
  let rim_color = vec3<f32>(0.9, 0.95, 1.0) * rim_combined;\r
\r
  // Subsurface scattering approximation for organic materials\r
  let sss_intensity = wrap_lambert(N_cam, -V_cam, 0.6) * 0.08;\r
  let sss_color = base * vec3<f32>(1.2, 1.0, 0.9) * sss_intensity;\r
\r
  // Combine all lighting components\r
  let lit_diffuse = base * (ambient_term + diffuse);\r
  let spec_color = vec3<f32>(0.97, 0.98, 1.0) * specular * 0.5;\r
  let combined = lit_diffuse + spec_color + rim_color * 0.25 + sss_color + fresnel_term * 0.15;\r
  \r
  return clamp(combined, vec3<f32>(0.0, 0.0, 0.0), vec3<f32>(2.0, 2.0, 2.0));\r
}\r
\r
fn ground_plane(vid: u32) -> vec4<f32> {\r
  let corner = i32(vid) % 6;\r
  var u: f32;\r
  var v: f32;\r
  if (corner == 0) { u = -1.0; v = -1.0; }\r
  else if (corner == 1) { u = -1.0; v =  1.0; }\r
  else if (corner == 2) { u =  1.0; v = -1.0; }\r
  else if (corner == 3) { u =  1.0; v = -1.0; }\r
  else if (corner == 4) { u = -1.0; v =  1.0; }\r
  else { u =  1.0; v =  1.0; }\r
  let H = getf(0u);\r
  let baseRadius = max(getf(1u), getf(2u));\r
  let sceneRadius = getf(33u);\r
  let scale = max(max(baseRadius, sceneRadius), 1.0) * 2.4;\r
  let world = vec4<f32>(u * scale, v * scale, -0.5 * H, 1.0);\r
  return world;\r
}\r
\r
@vertex\r
fn vs_main(@builtin(vertex_index) vid: u32) -> VSOut {\r
  // Reserve the very first two triangles for a simple ground plane quad so the\r
  // pot is visually anchored in space.\r
  if (vid < 6u) {\r
    var out: VSOut;\r
    let ground_world = ground_plane(vid);\r
    out.pos = vp_matrix() * ground_world;\r
    out.col = vec3<f32>(0.95, 0.95, 0.95);\r
    out.is_ground = 1.0;\r
    out.n_cam = vec3<f32>(0.0, 0.0, 1.0);\r
    out.world_pos = ground_world.xyz;\r
    return out;\r
  }\r
\r
  let local_vid = vid - 6u;\r
\r
  let cells_x = max(i32(getf(16u)), 1);\r
  let cells_outer_y = max(i32(getf(17u)), 1);\r
  let inner_y = max(i32(getf(27u)), 1);\r
  let bottom_rings = max(i32(getf(28u)), 2);\r
  let rim_rings = max(i32(getf(30u)), 1);\r
\r
  let cells_outer = cells_x * cells_outer_y;\r
  let cells_inner = cells_x * inner_y;\r
  let cells_bottom_top = cells_x * bottom_rings;\r
  let cells_bottom_under = cells_x * bottom_rings;\r
  let cells_rim = cells_x * rim_rings;\r
\r
  let verts_per_cell = 6;\r
  let cell = i32(local_vid) / verts_per_cell;\r
  let corner = i32(local_vid) % verts_per_cell;\r
\r
  var segment: u32 = 0u;\r
  var local_cell = cell;\r
  var seg_cells_y = cells_outer_y;\r
\r
  if (local_cell >= cells_outer) {\r
    local_cell -= cells_outer;\r
    segment = 1u;\r
    seg_cells_y = inner_y;\r
    if (local_cell >= cells_inner) {\r
      local_cell -= cells_inner;\r
      segment = 2u;\r
      seg_cells_y = bottom_rings;\r
      if (local_cell >= cells_bottom_top) {\r
        local_cell -= cells_bottom_top;\r
        segment = 3u;\r
        seg_cells_y = bottom_rings;\r
        if (local_cell >= cells_bottom_under) {\r
          local_cell -= cells_bottom_under;\r
          segment = 4u;\r
          seg_cells_y = rim_rings;\r
        }\r
      }\r
    }\r
  }\r
\r
  // Check if inner surface should be hidden\r
  let showInner = getf(SHOW_INNER_OFFSET) >= 0.5;\r
  if (segment == 1u && !showInner) {\r
    // Move inner surface vertices off-screen (degenerate triangle)\r
    var out: VSOut;\r
    out.pos = vec4<f32>(0.0, 0.0, -2.0, 1.0); // Behind near plane\r
    out.col = vec3<f32>(0.0, 0.0, 0.0);\r
    out.is_ground = 0.0;\r
    out.n_cam = vec3<f32>(0.0, 0.0, 1.0);\r
    out.world_pos = vec3<f32>(0.0, 0.0, 0.0);\r
    return out;\r
  }\r
\r
  let cx = local_cell % cells_x;\r
  let cy = local_cell / cells_x;\r
  let denom_x = f32(max(cells_x, 1));\r
  let denom_y = f32(max(seg_cells_y, 1));\r
  let u0 = f32(cx) / denom_x;\r
  let v0 = f32(cy) / denom_y;\r
  let u1 = f32(cx + 1) / denom_x;\r
  let v1 = f32(cy + 1) / denom_y;\r
\r
  var u: f32;\r
  var v: f32;\r
  if (corner == 0) { u = u0; v = v0; }\r
  else if (corner == 1) { u = u0; v = v1; }\r
  else if (corner == 2) { u = u1; v = v0; }\r
  else if (corner == 3) { u = u1; v = v0; }\r
  else if (corner == 4) { u = u0; v = v1; }\r
  else { u = u1; v = v1; }\r
\r
  let p = surface_point(segment, u, v);\r
  let H = getf(0u);\r
  let p_center = vec3<f32>(p.x, p.y, p.z - 0.5 * H);\r
  let world_centered = vec4<f32>(p_center, 1.0);\r
\r
  let du = 1.0 / denom_x;\r
  let dv = 1.0 / denom_y;\r
  let n_local = surface_normal(segment, u, v, du, dv);\r
\r
  let cameraEye = vec3<f32>(\r
    getf(CAMERA_EYE_OFFSET + 0u),\r
    getf(CAMERA_EYE_OFFSET + 1u),\r
    getf(CAMERA_EYE_OFFSET + 2u)\r
  );\r
  let view_dir = cameraEye - world_centered.xyz;\r
  let height_ratio = clamp(p.z / max(H, 1e-4), 0.0, 1.0);\r
  let base = gradient_color(height_ratio);\r
  let col = shade_color(base, n_local, view_dir);\r
\r
  var out: VSOut;\r
  out.pos = vp_matrix() * world_centered;\r
  out.col = col;\r
  out.is_ground = 0.0;\r
  out.n_cam = n_local;\r
  out.world_pos = world_centered.xyz;\r
  return out;\r
}\r
\r
@fragment\r
fn fs_main(@location(0) col: vec3<f32>, @location(1) _n_cam: vec3<f32>, @location(2) world_pos: vec3<f32>, @location(3) is_ground: f32) -> @location(0) vec4<f32> {\r
  if (getf(18u) >= 0.5) {\r
    return vec4<f32>(1.0, 0.0, 0.0, 1.0);\r
  }\r
  var safe = vec3<f32>(\r
    clamp(col.x, 0.03, 1.8),\r
    clamp(col.y, 0.03, 1.8),\r
    clamp(col.z, 0.03, 1.8)\r
  );\r
  let gridEnabled = getf(GRID_FLAG_OFFSET) >= 0.5;\r
  if (gridEnabled && is_ground >= 0.5) {\r
    let cameraEye = vec3<f32>(\r
      getf(CAMERA_EYE_OFFSET + 0u),\r
      getf(CAMERA_EYE_OFFSET + 1u),\r
      getf(CAMERA_EYE_OFFSET + 2u)\r
    );\r
    let cameraDistance = max(length(cameraEye), 1.0);\r
    var gridSize = 0.0;\r
    if (cameraDistance < 200.0) {\r
      gridSize = 10.0;\r
    } else if (cameraDistance < 400.0) {\r
      gridSize = 25.0;\r
    } else {\r
      gridSize = 50.0;\r
    }\r
    let zoomScale = clamp(cameraDistance / 160.0, 0.5, 3.5);\r
    let H = getf(0u);\r
    let groundZ = -0.5 * H;\r
    let zDiff = abs(world_pos.z - groundZ);\r
    if (zDiff < (max(H * 0.01, 0.5))) {\r
      let fx = fract(world_pos.x / gridSize);\r
      let fz = fract(world_pos.y / gridSize);\r
      let cellDistX = min(fx, 1.0 - fx);\r
      let cellDistY = min(fz, 1.0 - fz);\r
      let targetThicknessMm = 0.25 * zoomScale;\r
      let minorThreshold = clamp(targetThicknessMm, 0.12, 1.2);\r
      let majorThreshold = clamp(targetThicknessMm * 2.2, minorThreshold + 0.2, 3.0);\r
      let cellDistX_mm = cellDistX * gridSize;\r
      let cellDistY_mm = cellDistY * gridSize;\r
      let minorSignalX = clamp(1.0 - cellDistX_mm / minorThreshold, 0.0, 1.0);\r
      let minorSignalY = clamp(1.0 - cellDistY_mm / minorThreshold, 0.0, 1.0);\r
      let minorSignal = max(minorSignalX, minorSignalY);\r
      let majorStep : i32 = 5;\r
      var majorSignalX: f32 = 0.0;\r
      var majorSignalY: f32 = 0.0;\r
      let ratioX = world_pos.x / gridSize;\r
      let ratioY = world_pos.y / gridSize;\r
      let majorIndexX = i32(floor(ratioX + 0.5));\r
      let majorIndexY = i32(floor(ratioY + 0.5));\r
      if ((majorIndexX % majorStep) == 0) {\r
        majorSignalX = clamp(1.0 - cellDistX_mm / majorThreshold, 0.0, 1.0);\r
      }\r
      if ((majorIndexY % majorStep) == 0) {\r
        majorSignalY = clamp(1.0 - cellDistY_mm / majorThreshold, 0.0, 1.0);\r
      }\r
      let majorSignal = max(majorSignalX, majorSignalY);\r
      let axisThreshold = clamp(targetThicknessMm * 1.35, 0.12, 1.5);\r
      var axisSignal: f32 = 0.0;\r
      axisSignal = max(axisSignal, clamp(1.0 - abs(world_pos.x) / axisThreshold, 0.0, 1.0));\r
      axisSignal = max(axisSignal, clamp(1.0 - abs(world_pos.y) / axisThreshold, 0.0, 1.0));\r
      let lineColor = vec3<f32>(0.72, 0.80, 0.93);\r
      let majorColor = vec3<f32>(0.46, 0.56, 0.70);\r
      let axisColor = vec3<f32>(1.0, 0.65, 0.35);\r
      var highlightColor = lineColor;\r
      var highlightWeight = minorSignal * 0.8;\r
      let majorWeight = majorSignal * 1.1;\r
      if (majorWeight > highlightWeight) {\r
        highlightColor = majorColor;\r
        highlightWeight = majorWeight;\r
      }\r
      let axisWeight = axisSignal * 1.6;\r
      if (axisWeight > highlightWeight) {\r
        highlightColor = axisColor;\r
        highlightWeight = axisWeight;\r
      }\r
      let composite = clamp(highlightWeight, 0.0, 1.0);\r
      if (composite <= 1e-3) {\r
        discard;\r
      }\r

// Wireframe vertex shader - directly copies vs_main logic but for line-list\r
// The solid mesh topology is triangle-list with vertices organized as:\r
// - Vertices 0-5: ground plane (2 triangles)\r
// - Then cells with 6 vertices each (corners 0,1,2,3,4,5)\r
//   - Triangle 1: corners 0,1,2\r
//   - Triangle 2: corners 3,4,5\r
// For wireframe we want edges: 0-1, 1-2, 2-0, 3-4, 4-5, 5-3\r
// That's 6 edges * 2 verts = 12 line verts per 6 solid verts\r
// So wireframe_vid = solid_vid * 2\r
@vertex\r
fn vs_wireframe(@builtin(vertex_index) vid: u32) -> WireVSOut {\r

  // Each solid triangle (3 verts) becomes 6 line verts (3 edges)\r
  // Each cell has 2 triangles = 6 solid verts = 12 line verts\r
  \r
  // Map wireframe vid to triangle edge endpoints\r
  // For each solid triangle, we draw 3 edges: v0-v1, v1-v2, v2-v0\r
  // That's 6 line verts per triangle: [v0,v1, v1,v2, v2,v0]\r
  \r
  let solid_tri_vid = vid / 2u;  // Which solid vertex (as if triangle-list)\r
  let line_endpoint = vid % 2u;   // 0=start, 1=end of line segment\r
  \r
  // Within each triangle: vid%3 gives corner 0,1,2\r
  // Edge 0 (line verts 0,1): corner 0 -> corner 1\r
  // Edge 1 (line verts 2,3): corner 1 -> corner 2\r
  // Edge 2 (line verts 4,5): corner 2 -> corner 0\r
  let tri_corner = solid_tri_vid % 3u;  // 0, 1, or 2\r
  var solid_corner: u32;\r
  \r
  if (tri_corner == 0u) {\r

    solid_corner = select(0u, 1u, line_endpoint == 1u);\r
  } else if (tri_corner == 1u) {\r
    // Edge from corner 1 to corner 2\r
    solid_corner = select(1u, 2u, line_endpoint == 1u);\r
  } else {\r
    // Edge from corner 2 to corner 0\r
    solid_corner = select(2u, 0u, line_endpoint == 1u);\r
  }\r
  \r
  // Now convert from tri-based corner (0,1,2) to cell-based corner (0-5)\r
  // Solid mesh uses: corner 0,1,2 for tri 0 and corner 3,4,5 for tri 1\r
  // But corners 0,1,2 and 3,4,5 map to same UV pattern in the cell\r
  let tri_in_cell = (solid_tri_vid / 3u) % 2u;  // Which triangle in cell (0 or 1)\r
  if (tri_in_cell == 1u) {\r
    solid_corner += 3u;  // Use corners 3,4,5 for second triangle\r
  }\r
  \r
  // Calculate solid mesh vertex index\r
  let cell_idx = solid_tri_vid / 6u;  // Each cell = 2 triangles = 6 verts\r
  let solid_vid = cell_idx * 6u + solid_corner;\r
  \r
  // Hide ground plane wireframe (first cell = vids 0-5)\r
  if (solid_vid < 6u) {\r

    out.col = vec3<f32>(0.0);\r

  }\r
  \r
  let local_vid = solid_vid - 6u;\r
\r
  let cells_x = max(i32(getf(16u)), 1);\r
  let cells_outer_y = max(i32(getf(17u)), 1);\r
  let inner_y = max(i32(getf(27u)), 1);\r
  let bottom_rings = max(i32(getf(28u)), 2);\r
  let rim_rings = max(i32(getf(30u)), 1);\r
\r
  let cells_outer = cells_x * cells_outer_y;\r
  let cells_inner = cells_x * inner_y;\r
  let cells_bottom_top = cells_x * bottom_rings;\r
  let cells_bottom_under = cells_x * bottom_rings;\r
\r
  let verts_per_cell = 6;\r
  let cell = i32(local_vid) / verts_per_cell;\r
\r
  var segment: u32 = 0u;\r
  var local_cell = cell;\r
  var seg_cells_y = cells_outer_y;\r

  if (local_cell >= cells_outer) {\r
    local_cell -= cells_outer;\r
    segment = 1u;\r
    seg_cells_y = inner_y;\r
    if (local_cell >= cells_inner) {\r
      local_cell -= cells_inner;\r
      segment = 2u;\r
      seg_cells_y = bottom_rings;\r
      if (local_cell >= cells_bottom_top) {\r
        local_cell -= cells_bottom_top;\r
        segment = 3u;\r
        seg_cells_y = bottom_rings;\r
        if (local_cell >= cells_bottom_under) {\r

    var out: WireVSOut;\r
    out.pos = vec4<f32>(0.0, 0.0, -2.0, 1.0);\r
    out.col = vec3<f32>(0.0);\r
    return out;\r
  }\r

  let cx = local_cell % cells_x;\r
  let cy = local_cell / cells_x;\r
  let denom_x = f32(max(cells_x, 1));\r
  let denom_y = f32(max(seg_cells_y, 1));\r

  let v0 = f32(cy) / denom_y;\r
  let u1 = f32(cx + 1) / denom_x;\r

  var u: f32;\r
  var v: f32;\r
  // Map solid_corner to UV coordinates (same mapping as vs_main)\r
  if (solid_corner == 0u) { u = u0; v = v0; }\r
  else if (solid_corner == 1u) { u = u0; v = v1; }\r
  else if (solid_corner == 2u) { u = u1; v = v0; }\r
  else if (solid_corner == 3u) { u = u1; v = v0; }\r
  else if (solid_corner == 4u) { u = u0; v = v1; }\r
  else { u = u1; v = v1; }\r
\r
  let p = surface_point(segment, u, v);\r
  let H = getf(0u);\r
  let p_center = vec3<f32>(p.x, p.y, p.z - 0.5 * H);\r
  let world_centered = vec4<f32>(p_center, 1.0);\r
\r
  var out: WireVSOut;\r
  let projected = vp_matrix() * world_centered;\r
  // Bias z toward camera to draw on top of solid surface\r
  out.pos = vec4<f32>(projected.xy, projected.z - 0.002 * projected.w, projected.w);\r
  // White wireframe for visibility\r
  out.col = vec3<f32>(1.0, 1.0, 1.0);\r
  return out;\r
}\r
