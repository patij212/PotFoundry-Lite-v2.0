# Template for .streamlit/secrets.toml
# Use this as a copy/paste starter. Do NOT commit the resulting file.

[connections.supabase]
# Project URL (e.g. "https://xyzcompany.supabase.co")
url = "https://YOUR_PROJECT.supabase.co"

# Service role key (has full DB permissions - keep secret)
key = "REPLACE_WITH_SERVICE_ROLE_KEY"

# Optional: anon key for read-only browsing (no publishing)
# If you don't want to put a service role key on this device, you can
# set one of these to enable browsing the Public Library without publishing:
# anon = "REPLACE_WITH_ANON_KEY"
# anon_key = "REPLACE_WITH_ANON_KEY"

# Storage bucket name
bucket = "pots"

# ---- Root-level settings ----
# Application base url (for deeplinks) - optional
# Example local: "http://localhost:8501"
# Example cloud: "https://your-app.streamlit.app"
app_url = "http://localhost:8501"

# Feature flags (optional)
# DISABLE_LIBRARY = "0"  # set to "1" to disable library publishing
