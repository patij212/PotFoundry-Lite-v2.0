[mypy]
python_version = 3.12
ignore_missing_imports = True
disallow_untyped_defs = False
warn_unused_ignores = False
warn_return_any = False
warn_unreachable = False
warn_no_return = False
warn_redundant_casts = False
strict_equality = False
mypy_path = typings

# Keep per-module exceptions minimal

[mypy-pfui.*]
# Tighten types for pfui package incrementally. These stricter flags are
# intentionally enabled only for pfui to allow targeted fixes.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True

[mypy-tools.*]
# Tighten types for the tools package similarly to pfui. This enables stricter
# checks for small utility modules that are lower-risk to fix. We can iterate
# on fixes in small commits/PRs.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True

[mypy-requests.*]
ignore_missing_imports = True
[mypy-requests]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-potfoundry.yaml_api]
ignore_errors = True

[mypy-potfoundry.schema]
# Incremental tightening for the lightweight schema module. These flags are
# safe to enable early because the module is small and primarily contains
# Pydantic models that already carry type information.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True

[mypy-potfoundry.library]
# Tighten types for the library publishing helpers. This module is a
# good next target: it's fairly self-contained and uses typed dataclasses
# and simple helper functions that are usually straightforward to annotate.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True

[mypy-potfoundry.core.geometry]
# Begin incremental tightening for the heavy geometry core. Start with stricter
# checks that are actionable: progressively enable more flags as we fix
# issues. For now enable untyped-defs checks so we can address missing
# annotations function-by-function.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True
# Raise additional strictness to find latent Any/untyped issues. These flags
# are more aggressive and will be enabled temporarily while we iterate on
# fixes for `potfoundry.core.geometry`.
disallow_any_unimported = True
disallow_any_expr = True
disallow_any_explicit = True
disallow_any_decorated = True
disallow_any_generics = True
no_implicit_optional = True

[mypy-app]
ignore_errors = True
