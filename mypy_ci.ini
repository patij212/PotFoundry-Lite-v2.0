[mypy]
python_version = 3.12
ignore_missing_imports = True
disallow_untyped_defs = False
warn_unused_ignores = False
warn_return_any = False
warn_unreachable = False
warn_no_return = False
warn_redundant_casts = False
strict_equality = False
mypy_path = typings

# Keep per-module exceptions minimal
[mypy-requests.*]
ignore_missing_imports = True
[mypy-requests]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-potfoundry.yaml_api]
ignore_errors = True

[mypy-potfoundry.core.geometry]
ignore_errors = True

[mypy-app]
ignore_errors = True
