[mypy]
python_version = 3.12
ignore_missing_imports = True
disallow_untyped_defs = False
warn_unused_ignores = False
warn_return_any = False
warn_unreachable = False
warn_no_return = False
warn_redundant_casts = False
strict_equality = False
mypy_path = typings

# Keep per-module exceptions minimal

[mypy-pfui.*]
# Tighten types for pfui package incrementally. These stricter flags are
# intentionally enabled only for pfui to allow targeted fixes.
disallow_untyped_defs = True
disallow_incomplete_defs = True
warn_unused_ignores = True
warn_return_any = True
warn_no_return = True

[mypy-requests.*]
ignore_missing_imports = True
[mypy-requests]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-potfoundry.yaml_api]
ignore_errors = True

[mypy-potfoundry.core.geometry]
ignore_errors = True

[mypy-app]
ignore_errors = True
