<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <!-- Mobile viewport with proper scaling and safe area handling -->
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="description" content="PotFoundry - Design beautiful parametric 3D flower pots using WebGPU" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>PotFoundry - 3D Pot Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #0a0a0f;
      color: #e6edf3;
      /* Use dvh (dynamic viewport height) for proper mobile sizing */
      /* Falls back to vh for older browsers */
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      /* Prevent overscroll/bounce on iOS */
      overscroll-behavior: none;
      -webkit-overflow-scrolling: touch;
    }

    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      /* Handle safe areas for notched devices */
      padding-top: env(safe-area-inset-top, 0);
      padding-left: env(safe-area-inset-left, 0);
      padding-right: env(safe-area-inset-right, 0);
      /* Bottom safe area handled by bottom sheet */
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
