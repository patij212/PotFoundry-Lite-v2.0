[mypy]
# Mypy configuration for PotFoundry
python_version = 3.12
warn_return_any = True
warn_unused_configs = True
# Start lenient, tighten gradually
disallow_untyped_defs = False
disallow_any_unimported = False
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True
# Look for local type stubs in the `typings/` directory
mypy_path = typings

# Per-module options (gradually increase strictness)
[mypy-potfoundry.schema]
# Already has Pydantic types
disallow_untyped_defs = True

[mypy-potfoundry.core.io.stl]
# Simple module, can be strict
disallow_untyped_defs = True

# External libraries without stubs
[mypy-numpy.*]
ignore_missing_imports = True

[mypy-streamlit.*]
ignore_missing_imports = True

[mypy-plotly.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-yaml.*]
ignore_missing_imports = True

[mypy-matplotlib.*]
ignore_missing_imports = True

[mypy-mpl_toolkits.*]
ignore_missing_imports = True
